<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    /* 
        1px = 1/92 inches
        1ch = 0 character
        100% = parent's font size
        1vh = viewport hieght
        1vw = viewport width
    */
    body{
        font-size: 16px;
    }

    p{
        font-size: 1px;
        font-size: 15px;
        font-size: 1ch;
        font-size: 50%;
        font-size: 10vh;
        font-size: 1vw;
        font-size: 1em;
        font-size: 1rem;
    }

</style>
<body>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Culpa, tempore.</p>
</body>
</html>
