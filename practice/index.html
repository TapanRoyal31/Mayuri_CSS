<!doctype html>
<html>
  <head>
    <title>Profile Cards</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <style>
        body{
            font-family: cursive;
        }
        #main-title{
            text-align: center;
        }

        .card {
            background-color: aqua;
            height: 250px;
            width: 250px;
        }

         .card p{
            font-weight: 300;
            color: darkslategray;
         }

          h1, h2{

          }
  </style>
  <body>
    <h1 id="main-title">Team Members</h1>

    <div class="card">
      <h2 class="name">Alice</h2>
      <p class="role">Frontend Developer</p>
      <button>Contact</button>
    </div>

    <div class="card">
      <h2 class="name">Bob</h2>
      <p class="role">Backend Developer</p>
      <button>Contact</button>
    </div>
  </body>
</html>
